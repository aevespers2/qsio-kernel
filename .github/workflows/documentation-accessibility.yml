name: Documentation Accessibility Evidence

on:
  pull_request:
    paths:
      - "README.md"
      - "mkdocs.yml"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - "docs/**"
      - ".github/workflows/documentation-accessibility.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-accessibility-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    name: Exact-head accessibility protocol and site evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      SITE_DIR: ${{ runner.temp }}/qsio-kernel-accessibility-site
      EVIDENCE_DIR: ${{ runner.temp }}/qsio-kernel-accessibility-evidence

    steps:
      - name: Check out submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false

      - name: Assert immutable source identity
        id: source
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          printf 'source_sha=%s\n' "$actual_sha" > "$RUNNER_TEMP/accessibility-source-identity.txt"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned site tooling
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "mkdocs==1.6.1"
          python -m pip freeze | sort > "$RUNNER_TEMP/accessibility-documentation-dependencies.txt"

      - name: Validate accessibility protocol, profile, and structural invariants
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import math
          import re
          from pathlib import Path
          from typing import Any

          required = [
              Path("README.md"),
              Path("mkdocs.yml"),
              Path("taskchain.md"),
              Path("punchlist.md"),
              Path("release.md"),
              Path("changelog.md"),
              Path("docs/index.md"),
              Path("docs/accessibility-review-evidence.md"),
              Path("docs/accessibility-review-profile-v1.json"),
          ]
          missing = [str(path) for path in required if not path.is_file()]
          if missing:
              raise SystemExit(f"missing accessibility documentation: {missing}")

          def reject_duplicate_keys(pairs: list[tuple[str, Any]]) -> dict[str, Any]:
              result: dict[str, Any] = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate JSON key: {key}")
                  result[key] = value
              return result

          def reject_constant(value: str) -> None:
              raise ValueError(f"non-finite JSON value: {value}")

          profile_path = Path("docs/accessibility-review-profile-v1.json")
          profile = json.loads(
              profile_path.read_text(encoding="utf-8"),
              object_pairs_hook=reject_duplicate_keys,
              parse_constant=reject_constant,
          )

          def assert_finite(value: Any, location: str = "$") -> None:
              if isinstance(value, float) and not math.isfinite(value):
                  raise ValueError(f"non-finite number at {location}")
              if isinstance(value, dict):
                  for key, child in value.items():
                      assert_finite(child, f"{location}.{key}")
              elif isinstance(value, list):
                  for index, child in enumerate(value):
                      assert_finite(child, f"{location}[{index}]")

          assert_finite(profile)

          expected_states = {
              "NOT_REVIEWED",
              "AUTOMATED_CHECKS_ONLY",
              "MANUAL_REVIEW_INCOMPLETE",
              "REVIEWED_WITH_OPEN_FINDINGS",
              "REVIEWED_NO_KNOWN_BLOCKERS",
              "SUPERSEDED",
              "WITHDRAWN",
              "UNKNOWN",
          }
          if profile.get("schema_version") != "qsio.documentation-accessibility-review.v1":
              raise SystemExit("unexpected accessibility profile schema version")
          if profile.get("status") != "ACCESSIBILITY_REVIEW_PROTOCOL_DOCUMENTED_SITE_NOT_CERTIFIED":
              raise SystemExit("accessibility status must preserve the non-certification boundary")
          if profile.get("safe_default") != "NOT_REVIEWED":
              raise SystemExit("accessibility safe default must remain NOT_REVIEWED")
          if set(profile.get("review_states", [])) != expected_states:
              raise SystemExit("accessibility review states are incomplete or changed")
          denials = profile.get("authority_denials", {})
          if not denials or any(value is not False for value in denials.values()):
              raise SystemExit("every accessibility authority field must remain denied")
          gap = profile.get("fysa_120", {}).get("proposed_gap", {})
          if gap.get("id") != "019-R" or gap.get("authoritative") is not False:
              raise SystemExit("FYSA-120 accessibility refinement metadata is invalid")

          guide_path = Path("docs/accessibility-review-evidence.md")
          guide = guide_path.read_text(encoding="utf-8")
          required_markers = [
              "ACCESSIBILITY_REVIEW_PROTOCOL_DOCUMENTED_SITE_NOT_CERTIFIED",
              "The safe default is `NOT_REVIEWED` or `UNKNOWN`",
              "### Prose equivalent",
              "## Automated checks",
              "## Manual review matrix",
              "## Required review packet",
              "## Publication, withdrawal, and rollback boundary",
              "019-R — Exact-generation technical-site accessibility evidence",
          ]
          absent = [marker for marker in required_markers if marker not in guide]
          if absent:
              raise SystemExit(f"accessibility guide is missing semantic markers: {absent}")

          nav = Path("mkdocs.yml").read_text(encoding="utf-8")
          if "accessibility-review-evidence.md" not in nav:
              raise SystemExit("MkDocs navigation omits the accessibility review guide")

          controlled = [
              Path("README.md"),
              Path("taskchain.md"),
              Path("punchlist.md"),
              Path("release.md"),
              Path("changelog.md"),
              Path("docs/index.md"),
              guide_path,
          ]
          for path in controlled:
              text = path.read_text(encoding="utf-8")
              if "ACCESSIBILITY_REVIEW_PROTOCOL_DOCUMENTED_SITE_NOT_CERTIFIED" not in text and path.name not in {
                  "punchlist.md", "changelog.md"
              }:
                  raise SystemExit(f"{path} omits the governing accessibility status")

          def heading_levels(text: str) -> list[int]:
              levels: list[int] = []
              in_fence = False
              for line in text.splitlines():
                  if line.startswith("```"):
                      in_fence = not in_fence
                      continue
                  if in_fence:
                      continue
                  match = re.match(r"^(#{1,6})\s+\S", line)
                  if match:
                      levels.append(len(match.group(1)))
              return levels

          for path in [Path("docs/index.md"), guide_path]:
              levels = heading_levels(path.read_text(encoding="utf-8"))
              if not levels or levels[0] != 1:
                  raise SystemExit(f"{path} must begin with one level-one heading")
              for previous, current in zip(levels, levels[1:]):
                  if current > previous + 1:
                      raise SystemExit(f"{path} skips heading levels: {previous} to {current}")

          lines = guide.splitlines()
          table_count = 0
          for index in range(len(lines) - 1):
              if lines[index].lstrip().startswith("|") and lines[index + 1].lstrip().startswith("|"):
                  separator = lines[index + 1].replace("|", "").replace(":", "").replace("-", "").strip()
                  if not separator:
                      table_count += 1
          if table_count < 2:
              raise SystemExit("accessibility guide must contain review-state and severity tables with headers")

          if guide.count("```mermaid") != guide.count("### Prose equivalent"):
              raise SystemExit("each Mermaid diagram in the accessibility guide requires one prose equivalent")

          weak_link_text = re.compile(r"\[(here|click here|link|more)\]\(", re.IGNORECASE)
          weak = []
          for path in [Path("README.md"), *sorted(Path("docs").rglob("*.md"))]:
              if weak_link_text.search(path.read_text(encoding="utf-8")):
                  weak.append(str(path))
          if weak:
              raise SystemExit(f"weak standalone link text found: {weak}")

          output = Path("${RUNNER_TEMP}") / "accessibility-structural-validation.txt"
          output.write_text(
              "required_files=pass\n"
              "strict_json=pass\n"
              "profile_invariants=pass\n"
              "heading_order=pass\n"
              "table_headers=pass\n"
              "diagram_prose_equivalence=pass\n"
              "meaningful_link_text=pass\n",
              encoding="utf-8",
          )
          PY

      - name: Build rendered site strictly
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$SITE_DIR"
          mkdocs build --strict --site-dir "$SITE_DIR"
          test -f "$SITE_DIR/index.html"
          test -f "$SITE_DIR/accessibility-review-evidence/index.html"

      - name: Validate generated-site boundary
        id: boundary
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ! find "$SITE_DIR" -type f \( \
            -name '*.pem' -o \
            -name '*.key' -o \
            -name '*.p12' -o \
            -name '*.pfx' -o \
            -name '.env' -o \
            -name '.env.*' \
          \) -print -quit | grep -q .
          ! grep -RIlE '(BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|gh[pousr]_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9_-]{20,})' "$SITE_DIR"

      - name: Assert validation did not mutate tracked source
        id: clean
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git diff --name-only)"
          test -z "$(git status --porcelain --untracked-files=no)"

      - name: Record accessibility evidence
        if: always()
        shell: bash
        env:
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          BOUNDARY_OUTCOME: ${{ steps.boundary.outcome }}
          CLEAN_OUTCOME: ${{ steps.clean.outcome }}
        run: |
          set -euo pipefail
          rm -rf "$EVIDENCE_DIR"
          mkdir -p "$EVIDENCE_DIR"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'event=%s\n' "$GITHUB_EVENT_NAME"
            printf 'ref=%s\n' "$GITHUB_REF"
            printf 'python=%s\n' "$(python --version 2>&1 || true)"
            printf 'mkdocs=%s\n' "$(mkdocs --version 2>/dev/null || true)"
            printf 'source_outcome=%s\n' "$SOURCE_OUTCOME"
            printf 'install_outcome=%s\n' "$INSTALL_OUTCOME"
            printf 'validate_outcome=%s\n' "$VALIDATE_OUTCOME"
            printf 'build_outcome=%s\n' "$BUILD_OUTCOME"
            printf 'boundary_outcome=%s\n' "$BOUNDARY_OUTCOME"
            printf 'clean_outcome=%s\n' "$CLEAN_OUTCOME"
            printf 'review_state=AUTOMATED_CHECKS_ONLY\n'
            printf 'manual_review_completed=false\n'
            printf 'certification=false\n'
            printf 'publication_authority=false\n'
            printf 'generated_utc=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$EVIDENCE_DIR/accessibility-evidence.txt"
          cp -f "$RUNNER_TEMP/accessibility-source-identity.txt" "$EVIDENCE_DIR/" 2>/dev/null || true
          cp -f "$RUNNER_TEMP/accessibility-documentation-dependencies.txt" "$EVIDENCE_DIR/" 2>/dev/null || true
          cp -f "$RUNNER_TEMP/accessibility-structural-validation.txt" "$EVIDENCE_DIR/" 2>/dev/null || true
          cp docs/accessibility-review-profile-v1.json "$EVIDENCE_DIR/"
          find "$SITE_DIR" -type f -print0 2>/dev/null | sort -z | xargs -0 -r sha256sum > "$EVIDENCE_DIR/site-sha256.txt"
          find "$EVIDENCE_DIR" -type f ! -name evidence-sha256.txt -print0 | sort -z | xargs -0 sha256sum > "$EVIDENCE_DIR/evidence-sha256.txt"

      - name: Upload rendered site and accessibility evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qsio-kernel-accessibility-${{ env.SUBMITTED_SHA }}
          path: |
            ${{ env.SITE_DIR }}
            ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 30

      - name: Enforce final fail-closed gate
        if: always()
        shell: bash
        env:
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          BOUNDARY_OUTCOME: ${{ steps.boundary.outcome }}
          CLEAN_OUTCOME: ${{ steps.clean.outcome }}
        run: |
          set -euo pipefail
          for result in \
            "$SOURCE_OUTCOME" \
            "$INSTALL_OUTCOME" \
            "$VALIDATE_OUTCOME" \
            "$BUILD_OUTCOME" \
            "$BOUNDARY_OUTCOME" \
            "$CLEAN_OUTCOME"
          do
            test "$result" = "success"
          done
