site_name: QSIO Kernel
site_description: Bounded QSO/QSIO semantic-kernel, portfolio integration, and reference-conformance documentation
repo_url: https://github.com/aevespers2/qsio-kernel
repo_name: aevespers2/qsio-kernel
edit_uri: edit/main/docs/
strict: true

watch:
  - README.md
  - taskchain.md
  - punchlist.md
  - release.md
  - changelog.md

theme:
  name: mkdocs

nav:
  - Overview: index.md
  - Architecture:
      - System architecture: architecture.md
      - A.L.I.S.T.A.I.R.E. integration: alistaire-integration.md
      - Runtime conformance boundary: runtime-conformance-boundary-profile.md
      - Kernel-to-runtime crosswalk options: kernel-to-runtime-crosswalk-options.md
      - Obstruction and gluing analysis: obstruction-and-gluing.md
      - Ontology: ontology.md
      - Terminology: terminology.md
  - Design:
      - Contracts and invariants: design.md
      - Lifecycle: lifecycle.md
      - Public API: api.md
  - Development:
      - Developer onboarding: onboarding.md
      - Operations and recovery: operations.md
  - Assurance:
      - Security and trust boundaries: security.md
      - Threat model: threat-model.md
      - Scope and release governance: governance.md
  - Decisions:
      - ADR 0001 — Kernel boundaries: adr/0001-kernel-boundaries.md
      - ADR 0002 — A.L.I.S.T.A.I.R.E. role: adr/0002-alistaire-kernel-role.md
      - ADR 0003 — Reference conformance boundary: adr/0003-reference-conformance-boundary.md
      - ADR 0004 — Kernel-to-runtime crosswalk options: adr/0004-kernel-runtime-crosswalk-options.md

markdown_extensions:
  - tables
  - fenced_code
  - attr_list
  - toc:
      permalink: true
